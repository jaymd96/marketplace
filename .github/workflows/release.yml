name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jaymd96-guild
      - run: guild build
      - run: guild validate
      - name: Create Release
        uses: softprops/action-gh-release@v2
